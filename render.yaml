databases:
  - name: codity-postgres
    databaseName: codity
    user: codity
    plan: free

services:
  - type: web
    name: codity-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codity-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: codity-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codity-postgres
          property: connectionString
      - key: WORKER_CONCURRENCY
        value: 10
      - key: WORKER_POLL_INTERVAL_MS
        value: 1500
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: 5000
      - key: WORKER_SHUTDOWN_GRACE_MS
        value: 30000

  - type: web
    name: codity-web
    runtime: static
    buildCommand: npm install && npm run build --workspace=@codity/shared && npm run build --workspace=@codity/web
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://codity-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
